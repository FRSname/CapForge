<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://127.0.0.1:* ws://127.0.0.1:* blob:; media-src 'self' http://127.0.0.1:* blob:; style-src 'self' 'unsafe-inline';" />
  <title>SubForge</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- ===== Title Bar ===== -->
  <header class="titlebar">
    <div class="titlebar-left">
      <svg class="logo-icon" width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
        <path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v12.5A1.75 1.75 0 0 1 14.25 16H1.75A1.75 1.75 0 0 1 0 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h12.5a.25.25 0 0 0 .25-.25V1.75a.25.25 0 0 0-.25-.25ZM3 5.5a.75.75 0 0 1 .75-.75h8.5a.75.75 0 0 1 0 1.5h-8.5A.75.75 0 0 1 3 5.5Zm.75 2.75a.75.75 0 0 0 0 1.5h5.5a.75.75 0 0 0 0-1.5Z"/>
      </svg>
      <span class="app-name">SubForge</span>
    </div>
    <div class="titlebar-right">
      <button id="btn-settings-toggle" class="icon-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 0a8.2 8.2 0 0 1 .701.031C9.444.095 9.99.645 10.16 1.29l.288 1.107c.018.066.079.158.212.224.231.114.454.243.668.386.123.082.233.07.299.04l1.08-.43c.602-.24 1.29-.048 1.694.508a8 8 0 0 1 1.058 1.832c.208.577.04 1.224-.378 1.63l-.792.676a.336.336 0 0 0-.096.283c.026.27.04.544.04.822s-.014.552-.04.822a.336.336 0 0 0 .096.283l.792.676c.418.406.586 1.053.378 1.63a8 8 0 0 1-1.058 1.832c-.404.556-1.092.748-1.694.508l-1.08-.43c-.066-.03-.176-.042-.299.04a5 5 0 0 1-.668.386c-.133.066-.194.158-.212.224l-.288 1.107c-.17.645-.716 1.195-1.459 1.26a8.1 8.1 0 0 1-1.402 0c-.743-.065-1.289-.615-1.459-1.26l-.288-1.107a.34.34 0 0 0-.212-.224 5 5 0 0 1-.668-.386c-.123-.082-.233-.07-.299-.04l-1.08.43c-.602.24-1.29.048-1.694-.508a8 8 0 0 1-1.058-1.832c-.208-.577-.04-1.224.378-1.63l.792-.676a.336.336 0 0 0 .096-.283 5 5 0 0 1 0-1.644.336.336 0 0 0-.096-.283l-.792-.676c-.418-.406-.586-1.053-.378-1.63a8 8 0 0 1 1.058-1.832c.404-.556 1.092-.748 1.694-.508l1.08.43c.066.03.176.042.299-.04.214-.143.437-.272.668-.386.133-.066.194-.158.212-.224l.288-1.107C6.01.645 6.556.095 7.299.03 7.53.01 7.764 0 8 0Zm-.571 1.525c-.036.003-.108.036-.137.146l-.289 1.105c-.147.561-.55.967-.997 1.189-.174.086-.342.183-.504.29-.417.276-.93.379-1.457.155l-1.08-.43c-.109-.044-.196.017-.231.065a6.5 6.5 0 0 0-.86 1.491c-.065.18.005.29.058.338l.793.677c.428.365.653.898.626 1.448-.009.18-.009.363 0 .542.027.55-.198 1.083-.626 1.448l-.793.677c-.053.047-.123.158-.058.338.18.497.418.969.86 1.491.035.048.122.11.231.065l1.08-.43c.527-.224 1.04-.121 1.457.155.162.107.33.204.504.29.447.222.85.628.997 1.189l.289 1.105c.029.11.1.143.137.146a6.6 6.6 0 0 0 1.142 0c.036-.003.108-.036.137-.146l.289-1.105c.147-.561.55-.967.997-1.189.174-.086.342-.183.504-.29.417-.276.93-.379 1.457-.155l1.08.43c.109.044.196-.017.231-.065.442-.522.68-.994.86-1.491.065-.18-.005-.29-.058-.338l-.793-.677c-.428-.365-.653-.898-.626-1.448.009-.18.009-.363 0-.542-.027-.55.198-1.083.626-1.448l.793-.677c.053-.047.123-.158.058-.338a6.5 6.5 0 0 0-.86-1.491c-.035-.048-.122-.11-.231-.065l-1.08.43c-.527.224-1.04.121-1.457-.155a4 4 0 0 0-.504-.29c-.447-.222-.85-.628-.997-1.189l-.289-1.105c-.029-.11-.1-.143-.137-.146a6.6 6.6 0 0 0-1.142 0ZM11 8a3 3 0 1 1-6 0 3 3 0 0 1 6 0ZM9.5 8a1.5 1.5 0 1 0-3.001.001A1.5 1.5 0 0 0 9.5 8Z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ===== Main Content ===== -->
  <main class="content">

    <!-- SCREEN 1: File Selection -->
    <section id="screen-file" class="screen active">
      <div id="drop-zone" class="drop-zone">
        <svg class="drop-icon" width="48" height="48" viewBox="0 0 16 16" fill="currentColor">
          <path d="M3.75 1.5a.25.25 0 0 0-.25.25v11.5c0 .138.112.25.25.25h8.5a.25.25 0 0 0 .25-.25V6H9.75A1.75 1.75 0 0 1 8 4.25V1.5Zm5.75 0v2.75c0 .138.112.25.25.25h2.75l-3-3ZM2 1.75C2 .784 2.784 0 3.75 0h5.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 12.25 16h-8.5A1.75 1.75 0 0 1 2 14.25Z"/>
        </svg>
        <p class="drop-text">Drop audio file here</p>
        <p class="drop-hint">or click to browse</p>
        <p class="drop-formats">mp3 · wav · m4a · flac · mp4 · mkv</p>
      </div>
      <div id="file-info" class="file-info hidden">
        <div class="file-info-row">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M3.75 1.5a.25.25 0 0 0-.25.25v11.5c0 .138.112.25.25.25h8.5a.25.25 0 0 0 .25-.25V6H9.75A1.75 1.75 0 0 1 8 4.25V1.5Zm5.75 0v2.75c0 .138.112.25.25.25h2.75l-3-3ZM2 1.75C2 .784 2.784 0 3.75 0h5.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 12.25 16h-8.5A1.75 1.75 0 0 1 2 14.25Z"/>
          </svg>
          <span id="file-name" class="file-name">-</span>
          <button id="btn-clear-file" class="text-btn" title="Remove file">✕</button>
        </div>
        <button id="btn-start" class="primary-btn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Zm4.879-2.773 4.264 2.559a.25.25 0 0 1 0 .428l-4.264 2.559A.25.25 0 0 1 6 10.559V5.442a.25.25 0 0 1 .379-.215Z"/></svg>
          Start Transcription
        </button>
      </div>
    </section>

    <!-- SCREEN 2: Progress -->
    <section id="screen-progress" class="screen">
      <div class="progress-container">
        <div class="progress-step" id="step-indicator">Loading model…</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
        </div>
        <div class="progress-pct" id="progress-pct">0%</div>
        <div class="progress-log" id="progress-log"></div>
        <button id="btn-cancel" class="danger-btn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.749.749 0 0 1 1.275.326.749.749 0 0 1-.215.734L9.06 8l3.22 3.22a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215L8 9.06l-3.22 3.22a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06Z"/></svg>
          Cancel
        </button>
      </div>
    </section>

    <!-- SCREEN 3: Results -->
    <section id="screen-results" class="screen results-screen">
      <div class="results-container">
        <h2 class="results-title">
          <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"/></svg>
          Transcription Complete
        </h2>

        <!-- Audio Player -->
        <div class="audio-player" id="audio-player">
          <div class="waveform-container" id="waveform"></div>
          <div class="player-controls">
            <button id="btn-play" class="icon-btn play-btn" title="Play/Pause (Space)">
              <svg id="icon-play" width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Zm4.879-2.773 4.264 2.559a.25.25 0 0 1 0 .428l-4.264 2.559A.25.25 0 0 1 6 10.559V5.442a.25.25 0 0 1 .379-.215Z"/></svg>
              <svg id="icon-pause" width="20" height="20" viewBox="0 0 16 16" fill="currentColor" class="hidden"><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0ZM6 4.75A.75.75 0 0 1 6.75 4h.5a.75.75 0 0 1 .75.75v6.5a.75.75 0 0 1-.75.75h-.5a.75.75 0 0 1-.75-.75Zm4 0a.75.75 0 0 1-.75.75h-.5A.75.75 0 0 1 8 4.75v6.5a.75.75 0 0 1 .75.75h.5a.75.75 0 0 1 .75-.75Z"/></svg>
            </button>
            <span class="player-time" id="player-time">00:00 / 00:00</span>
          </div>
        </div>

        <!-- Subtitle display synced to audio -->
        <div class="subtitle-live" id="subtitle-live"></div>

        <!-- Edit toolbar -->
        <div class="edit-toolbar" id="edit-toolbar">
          <div class="edit-toolbar-left">
            <button id="btn-edit-toggle" class="toolbar-btn" title="Toggle edit mode (E)">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M11.013 1.427a1.75 1.75 0 0 1 2.474 0l1.086 1.086a1.75 1.75 0 0 1 0 2.474l-8.61 8.61c-.21.21-.47.364-.756.445l-3.251.93a.75.75 0 0 1-.927-.928l.929-3.25c.081-.286.235-.547.445-.758ZM12.13 2.49a.25.25 0 0 0-.354 0l-1.06 1.06 2.768 2.768 1.06-1.06a.25.25 0 0 0 0-.354Zm.97 4.888L10.33 4.61l-6.37 6.37a.25.25 0 0 0-.057.1l-.666 2.33 2.33-.666a.25.25 0 0 0 .1-.057Z"/></svg>
              <span>Edit</span>
            </button>
            <span class="edit-status" id="edit-status"></span>
          </div>
          <div class="edit-toolbar-right hidden" id="edit-actions">
            <button id="btn-edit-save" class="toolbar-btn toolbar-btn-save" title="Save changes">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"/></svg>
              Save
            </button>
            <button id="btn-edit-discard" class="toolbar-btn toolbar-btn-discard" title="Discard changes">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.749.749 0 0 1 1.275.326.749.749 0 0 1-.215.734L9.06 8l3.22 3.22a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215L8 9.06l-3.22 3.22a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06Z"/></svg>
              Discard
            </button>
          </div>
        </div>

        <!-- Transcript preview (clickable segments) -->
        <div class="results-preview" id="results-preview"></div>

        <!-- Exported files list -->
        <div class="exported-files hidden" id="exported-files">
          <div class="setting-label">Exported files</div>
          <ul id="exported-list"></ul>
        </div>

        <div class="results-actions">
          <button id="btn-export" class="primary-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14ZM7.25 7.689V2a.75.75 0 0 1 1.5 0v5.689l1.97-1.969a.749.749 0 1 1 1.06 1.06l-3.25 3.25a.749.749 0 0 1-1.06 0L4.22 6.78a.749.749 0 1 1 1.06-1.06Z"/></svg>
            Export Files
          </button>
          <button id="btn-new" class="secondary-btn">New Transcription</button>
        </div>
      </div>
    </section>

  </main>

  <!-- ===== Settings Sidebar ===== -->
  <aside id="settings-panel" class="settings-panel">
    <h3 class="settings-title">Settings</h3>

    <label class="setting-label">Language</label>
    <select id="sel-language" class="setting-input">
      <option value="">Auto-detect</option>
    </select>

    <label class="setting-label">Hardware</label>
    <div id="hw-info" class="hw-info">Detecting…</div>

    <label class="setting-label">Speaker Diarization</label>
    <label class="toggle">
      <input type="checkbox" id="chk-diarize" />
      <span class="toggle-slider"></span>
      <span class="toggle-text">Identify speakers</span>
    </label>
    <input type="text" id="inp-hf-token" class="setting-input hidden" placeholder="HuggingFace Token" autocomplete="off" />

    <label class="setting-label">Output Formats</label>
    <div class="checkbox-group">
      <label><input type="checkbox" value="srt_word" checked /> Word SRT</label>
      <label><input type="checkbox" value="srt_standard" /> Standard SRT</label>
      <label><input type="checkbox" value="json" checked /> JSON</label>
      <label><input type="checkbox" value="vtt" /> VTT</label>
      <label><input type="checkbox" value="subforge" /> SubForge</label>
    </div>

    <label class="setting-label">Output Directory</label>
    <div class="dir-picker">
      <span id="output-dir-display" class="dir-path">./output</span>
      <button id="btn-pick-dir" class="text-btn">Browse</button>
    </div>
  </aside>

  <!-- Scripts -->
  <script src="js/wavesurfer.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
